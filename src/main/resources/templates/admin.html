<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title>FoodHub Admin</title>
</head>
<body>
<body class="dark-theme">
    <div class="top-nav-actions">
        <a href="/" class="logout-link">
            <i class="fas fa-sign-out-alt"></i> Exit System
        </a>
    </div>
    <div class="sidebar">
        <h3>🍔 FoodHub</h3>
        <hr>
        <p>Menu Management</p>
        <p>Order History</p>
        <p>Staff Logs</p>
        <a href="/" class="btn btn-danger btn-sm mt-5">Logout</a>
    </div>
    <div class="main-content">
        <h2>Admin Dashboard</h2>
        <div class="row mt-4">
            <div class="col-md-4">
                <div class="card p-3">
                    <h4>Total Sales</h4>
                    <h2 class="text-warning">$1,240.00</h2>
                </div>
            </div>
        </div>
        <h4 class="mt-5">Manage Food Items</h4>
        <table class="table table-dark mt-3">
            <thead>
                <tr><th>Item Name</th><th>Price</th><th>Category</th><th>Action</th></tr>
            </thead>
            <tbody>
                <tr><td>Cheese Burger</td><td>$12.00</td><td>Main Course</td><td><button class="btn btn-sm btn-info">Edit</button></td></tr>
            </tbody>
        </table>
    </div>
</body>
</html>
