<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title>Waiter Display</title>
</head>
<body class="kitchen-body">
    <header class="kitchen-header">
        <div class="header-left">
            <div class="logo-badge"><i class="fas fa-concierge-bell"></i><span>Waiter</span></div>
            <h2>Service Dashboard</h2>
        </div>
        <div class="header-center">
            <div class="time-badge"><i class="far fa-clock me-2"></i><span id="currentTime"></span></div>
        </div>
        <div class="header-right">
            <a th:href="@{/logout}" class="btn-logout-inline"><i class="fas fa-sign-out-alt"></i></a>
        </div>
    </header>

    <main class="kitchen-container" id="kanban-board">
        <section class="order-column w-50 pe-3" style="min-width: 400px;">
            <div class="column-header column-ready">
                <i class="fas fa-check-circle"></i>
                <h3>Ready to Serve</h3>
            </div>
            <div class="orders-list" id="readyList"></div>
        </section>

        <section class="order-column w-50 ps-3 border-start" style="min-width: 400px;">
            <div class="column-header" style="background:#fff3cd; color:#856404; border: 1px solid #ffeeba;">
                <i class="fas fa-bell"></i>
                <h3>Needs Assistance</h3>
            </div>
            <div class="orders-list" id="callsList"></div>
        </section>
    </main>

    <script>
        // Clock
        setInterval(() => {
            document.getElementById('currentTime').textContent = new Date().toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit',hour12:true});
        }, 1000);

        function fetchOrders() {
            fetch('/api/orders/ready')
                .then(res => res.json())
                .then(data => renderOrders(data))
                .catch(err => console.error(err));
                
            fetch('/api/waiter/calls')
                .then(res => res.json())
                .then(data => renderCalls(data))
                .catch(err => console.error(err));
        }
        setInterval(fetchOrders, 3000);
        fetchOrders();

        function renderCalls(calls) {
            document.getElementById('callsList').innerHTML = calls.map(c => `
                <article class="order-card shadow-sm" style="background: #fff8f8; border: 2px solid #ff4d4f; animation: pulse-border 2s infinite;">
                    <div class="order-header">
                        <div class="order-number text-danger"><i class="fas fa-exclamation-triangle"></i> Table ${c.tableNumber}</div>
                    </div>
                    <div class="order-items my-3 text-dark fw-bold text-center">
                        Guest requested assistance.
                    </div>
                    <div class="order-meta text-muted small">
                        <i class="fas fa-clock"></i> Called at: ${new Date(c.createdAt).toLocaleTimeString()}
                    </div>
                    <button class="btn-order-action mt-3 border-0 w-100" style="background: #ff4d4f; color: white;" onclick="resolveCall(${c.id})">
                        <i class="fas fa-check"></i> Mark Resolved
                    </button>
                </article>
            `).join('');
        }

        function resolveCall(id) {
            fetch(\`/api/waiter/calls/\${id}/resolve\`, { method: 'POST' }).then(() => fetchOrders());
        }

        function renderOrders(orders) {
            document.getElementById('readyList').innerHTML = orders.map(o => buildCard(o, 'SERVED', 'Mark as Served', 'fas fa-utensils')).join('');
        }

        function buildCard(order, nextStatus, btnText, btnIcon) {
            let itemsHtml = order.items.map(i => `
                <div class="order-item">
                    <span class="item-qty">${i.quantity}x</span>
                    <span class="item-name">${i.foodItem.name}</span>
                </div>
            `).join('');
            
            return `
            <article class="order-card order-ready">
                <div class="order-header">
                    <div class="order-number">#${order.id}</div>
                </div>
                <div class="order-items">${itemsHtml}</div>
                <div class="order-meta">
                    <span class="table-info"><i class="fas fa-chair"></i> Table ${order.tableNumber}</span>
                </div>
                <button class="btn-order-action btn-served" onclick="updateStatus(${order.id}, '${nextStatus}')">
                    <i class="${btnIcon}"></i> ${btnText}
                </button>
            </article>`;
        }

        function updateStatus(id, status) {
            fetch(`/api/orders/${id}/status`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status })
            }).then(() => fetchOrders());
        }
    </script>
</body>
</html>
