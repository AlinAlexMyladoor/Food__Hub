<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title>Order Food - FoodHub</title>
</head>
<body>
    <body class="dark-theme">
    <div class="top-nav-actions">
        <a href="/" class="logout-link">
            <i class="fas fa-sign-out-alt"></i> Exit System
        </a>
    </div>
    <nav class="navbar navbar-dark bg-dark px-4">
        <span class="navbar-brand">🍽️ FoodHub Menu</span>
        <span class="text-warning">Table #05</span>
    </nav>
    <div class="container mt-4">
        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=500" class="card-img-top" alt="Burger">
                    <div class="card-body text-center">
                        <h5>Classic Burger</h5>
                        <p class="text-warning">$12.00</p>

                </div>
