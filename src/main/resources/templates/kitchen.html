<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title>Kitchen Display</title>
</head>
<body class="kitchen-body">
    <header class="kitchen-header">
        <div class="header-left">
            <div class="logo-badge"><i class="fas fa-fire"></i><span>Kitchen</span></div>
            <h2>Live Orders Dashboard</h2>
        </div>
        <div class="header-center">
            <div class="time-badge"><i class="far fa-clock me-2"></i><span id="currentTime"></span></div>
        </div>
        <div class="header-right">
            <a th:href="@{/logout}" class="btn btn-outline-danger fw-bold shadow-sm px-4 rounded-pill border-2" style="background:#fff;"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
        </div>
    </header>

    <div class="container mt-4 mb-2">
        <div class="row text-center d-flex justify-content-center gap-4">
            <div class="col-md-3 p-3 bg-white shadow-sm rounded-3 border-bottom border-primary border-4">
                <h5 class="text-muted fw-bold mb-1">Pending Orders</h5>
                <h2 class="m-0 text-primary fw-bold" id="metricPlaced">0</h2>
            </div>
            <div class="col-md-3 p-3 bg-white shadow-sm rounded-3 border-bottom border-warning border-4">
                <h5 class="text-muted fw-bold mb-1">Currently Cooking</h5>
                <h2 class="m-0 text-warning fw-bold" id="metricCooking">0</h2>
            </div>
        </div>
    </div>

    <main class="container d-flex justify-content-center align-items-start mt-4 gap-5" id="kanban-board" style="max-width: 1200px;">
        <section class="order-column w-50" style="min-width: 450px; max-width: 550px;">
            <div class="p-3 bg-white rounded-3 shadow-sm border-start border-primary border-5 d-flex align-items-center mb-4">
                <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center me-3 shadow-sm" style="width:45px; height:45px;">
                    <i class="fas fa-clock fs-5"></i>
                </div>
                <h3 class="m-0 fw-bold text-dark fs-4">New Orders</h3>
            </div>
            <div class="orders-list" id="placedList"></div>
        </section>

        <section class="order-column w-50" style="min-width: 450px; max-width: 550px;">
            <div class="p-3 bg-white rounded-3 shadow-sm border-start border-warning border-5 d-flex align-items-center mb-4">
                <div class="bg-warning text-dark rounded-circle d-flex align-items-center justify-content-center me-3 shadow-sm" style="width:45px; height:45px;">
                    <i class="fas fa-fire fs-5"></i>
                </div>
                <h3 class="m-0 fw-bold text-dark fs-4">Cooking</h3>
            </div>
            <div class="orders-list" id="cookingList"></div>
        </section>
    </main>

    <script>
        // Clock
        setInterval(() => {
            document.getElementById('currentTime').textContent = new Date().toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit',hour12:true});
        }, 1000);

        // Polling loop
        function fetchOrders() {
            fetch('/api/orders/active')
                .then(res => res.json())
                .then(data => renderOrders(data))
                .catch(err => console.error(err));
        }
        setInterval(fetchOrders, 3000);
        fetchOrders();

        let lastPlaced = '';
        let lastCooking = '';
        function renderOrders(orders) {
            const placed = orders.filter(o => o.status === 'PLACED');
            const cooking = orders.filter(o => o.status === 'COOKING');

            document.getElementById('metricPlaced').innerText = placed.length;
            document.getElementById('metricCooking').innerText = cooking.length;

            const newPlaced = placed.map(o => buildCard(o, 'COOKING', 'Start Preparing', 'fas fa-play')).join('');
            if (lastPlaced !== newPlaced) {
                document.getElementById('placedList').innerHTML = newPlaced;
                lastPlaced = newPlaced;
            }

            const newCooking = cooking.map(o => buildCard(o, 'READY', 'Mark as Ready', 'fas fa-check')).join('');
            if (lastCooking !== newCooking) {
                document.getElementById('cookingList').innerHTML = newCooking;
                lastCooking = newCooking;
            }
        }

        function buildCard(order, nextStatus, btnText, btnIcon) {
            const isCooking = nextStatus !== 'COOKING';
            const colorClass = isCooking ? 'warning' : 'primary';
            const statusBorder = isCooking ? '#ffc107' : '#0d6efd';
            
            let itemsHtml = order.items.map(i => `
                <div class="d-flex flex-column mb-2 pb-2 border-bottom border-light">
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="fw-bold text-dark"><span class="badge bg-secondary me-2">${i.quantity}x</span>${i.foodItem.name}</span>
                    </div>
                    ${i.specialInstructions ? `<div class="badge bg-danger text-white mt-2 text-wrap text-start fs-6"><i class="fas fa-exclamation-triangle me-1"></i> ${i.specialInstructions}</div>` : ''}
                </div>
            `).join('');
            
            return `
            <article class="order-card shadow-sm mb-3" style="background: #fdfdfd; border-left: 4px solid ${statusBorder}; border-radius: 8px; padding: 15px;">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div class="order-number text-${colorClass} fw-bold fs-5">
                        <i class="fas fa-hashtag me-1"></i> Order #${order.id}
                    </div>
                    <span class="badge bg-secondary rounded-pill px-3 py-2 fs-6">
                        <i class="fas fa-chair me-1"></i> Table ${order.tableNumber}
                    </span>
                </div>
                <div class="order-items bg-white border rounded p-2 shadow-sm mb-3" style="max-height: 250px; overflow-y: auto;">
                    ${itemsHtml}
                </div>
                <button class="btn btn-outline-${colorClass} w-100 fw-bold shadow-sm" onclick="updateStatus(${order.id}, '${nextStatus}')">
                    <i class="${btnIcon} me-2"></i> ${btnText}
                </button>
            </article>`;
        }

        function updateStatus(id, status) {
            fetch(`/api/orders/${id}/status`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status })
            }).then(() => fetchOrders());
        }
    </script>
</body>
</html>
