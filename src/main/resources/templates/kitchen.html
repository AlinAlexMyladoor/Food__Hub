<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title>Kitchen Display</title>
</head>
<body class="kitchen-body">
    <header class="kitchen-header">
        <div class="header-left">
            <div class="logo-badge"><i class="fas fa-fire"></i><span>Kitchen</span></div>
            <h2>Live Orders Dashboard</h2>
        </div>
        <div class="header-center">
            <div class="time-badge"><i class="far fa-clock me-2"></i><span id="currentTime"></span></div>
        </div>
        <div class="header-right">
            <a th:href="@{/logout}" class="btn-logout-inline"><i class="fas fa-sign-out-alt"></i></a>
        </div>
    </header>

    <main class="kitchen-container" id="kanban-board">
        <section class="order-column">
            <div class="column-header column-pending">
                <i class="fas fa-clock"></i>
                <h3>New Orders (PLACED)</h3>
            </div>
            <div class="orders-list" id="placedList"></div>
        </section>

        <section class="order-column">
            <div class="column-header column-preparing">
                <i class="fas fa-fire"></i>
                <h3>Preparing (COOKING)</h3>
            </div>
            <div class="orders-list" id="cookingList"></div>
        </section>
    </main>

    <script>
        // Clock
        setInterval(() => {
            document.getElementById('currentTime').textContent = new Date().toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit',hour12:true});
        }, 1000);

        // Polling loop
        function fetchOrders() {
            fetch('/api/orders/active')
                .then(res => res.json())
                .then(data => renderOrders(data))
                .catch(err => console.error(err));
        }
        setInterval(fetchOrders, 3000);
        fetchOrders();

        function renderOrders(orders) {
            const placed = orders.filter(o => o.status === 'PLACED');
            const cooking = orders.filter(o => o.status === 'COOKING');

            document.getElementById('placedList').innerHTML = placed.map(o => buildCard(o, 'COOKING', 'Start Preparing', 'fas fa-play')).join('');
            document.getElementById('cookingList').innerHTML = cooking.map(o => buildCard(o, 'READY', 'Mark as Ready', 'fas fa-check')).join('');
        }

        function buildCard(order, nextStatus, btnText, btnIcon) {
            let itemsHtml = order.items.map(i => `
                <div class="order-item" style="display:flex; flex-direction:column;">
                    <div style="display:flex; justify-content:space-between;">
                        <span class="item-qty">${i.quantity}x</span>
                        <span class="item-name">${i.foodItem.name}</span>
                    </div>
                    ${i.specialInstructions ? `<div class="badge bg-warning text-dark mt-1 text-wrap text-start" style="font-size:0.75rem;"><i class="fas fa-exclamation-triangle"></i> Note: ${i.specialInstructions}</div>` : ''}
                </div>
            `).join('');
            
            return `
            <article class="order-card order-new">
                <div class="order-header">
                    <div class="order-number">#${order.id}</div>
                </div>
                <div class="order-items">${itemsHtml}</div>
                <div class="order-meta">
                    <span class="table-info"><i class="fas fa-chair"></i> Table ${order.tableNumber}</span>
                </div>
                <button class="btn-order-action btn-start" onclick="updateStatus(${order.id}, '${nextStatus}')">
                    <i class="${btnIcon}"></i> ${btnText}
                </button>
            </article>`;
        }

        function updateStatus(id, status) {
            fetch(`/api/orders/${id}/status`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status })
            }).then(() => fetchOrders());
        }
    </script>
</body>
</html>
