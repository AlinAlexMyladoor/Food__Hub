<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>FoodHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/login.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="dark-theme">

    <div class="container text-center">
        <h1 class="logo-text mb-5">𝐅𝐨𝐨𝐝𝐇𝐮𝐛❞</h1>

        <div id="roleSelection" class="row justify-content-center">
            <div class="col-md-3" onclick="selectRole('CUSTOMER')">
                <div class="role-card">
                    <i class="fas fa-utensils"></i>
                    <h3>Customer</h3>
                    <p>Order delicious meals</p>
                </div>
            </div>
            <div class="col-md-3" onclick="selectRole('WAITER')">
                <div class="role-card">
                    <i class="fas fa-concierge-bell"></i>
                    <h3>Waiter</h3>
                    <p>Manage tables & service</p>
                </div>
            </div>
            <div class="col-md-3" onclick="selectRole('KITCHEN')">
                <div class="role-card">
                    <i class="fas fa-fire"></i>
                    <h3>Kitchen</h3>
                    <p>Live order tracking</p>
                </div>
            </div>
            <div class="col-md-3" onclick="selectRole('ADMIN')">
                <div class="role-card">
                    <i class="fas fa-user-shield"></i>
                    <h3>Admin</h3>
                    <p>Full system control</p>
                </div>
            </div>
        </div>

        <div id="loginFormContainer" class="login-box d-none">
            <button class="btn btn-link text-warning mb-3" onclick="goBack()"><i class="fas fa-arrow-left"></i> Back</button>
            <h2 id="selectedRoleTitle" class="mb-4">Login</h2>
            
            <form th:action="@{/login}" method="post">
                <input type="hidden" name="role" id="hiddenRoleInput">
                
                <div class="mb-3 text-start">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control custom-input" placeholder="Enter username" required>
                </div>
                <div class="mb-3 text-start">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control custom-input" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-warning w-100 py-2 fw-bold">Login</button>
            </form>
            <p th:if="${error}" class="mt-3 text-danger" th:text="${error}"></p>
        </div>
    </div>

    <script>
        function selectRole(role) {
            document.getElementById('roleSelection').classList.add('d-none');
            document.getElementById('loginFormContainer').classList.remove('d-none');
            document.getElementById('selectedRoleTitle').innerText = role + " LOGIN";
            document.getElementById('hiddenRoleInput').value = role;
        }

        function goBack() {
            document.getElementById('roleSelection').classList.remove('d-none');
            document.getElementById('loginFormContainer').classList.add('d-none');
        }
    </script>
</body>
</html>
