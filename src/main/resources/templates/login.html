<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>FoodHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/login.css(v=3)}">
</head>

<body>
    <!-- Animated particles background -->
    <div class="particles-container">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="container text-center py-5 position-relative" style="z-index: 2;">
        <div class="logo-wrapper">
            <h1 class="logo-text mb-2">
                <span class="logo-letter" style="--i:0">F</span>
                <span class="logo-letter" style="--i:1">O</span>
                <span class="logo-letter" style="--i:2">O</span>
                <span class="logo-letter" style="--i:3">D</span>
                <span class="logo-letter" style="--i:4">H</span>
                <span class="logo-letter" style="--i:5">U</span>
                <span class="logo-letter" style="--i:6">B</span>
                <span class="logo-icon">🍔</span>
            </h1>
        </div>
        <p class="text-muted mb-5 fade-in-up">Select your portal to continue</p>

        <div id="roleSelection" class="row justify-content-center g-4"
            th:classappend="${selectedRole != null} ? 'd-none' : ''">

            <div class="col-md-3 col-sm-6 role-card-col" style="--delay: 0.1s">
                <div class="role-card" onclick="selectRole('CUSTOMER')">
                    <div class="icon-wrapper">
                        <i class="fas fa-utensils"></i>
                    </div>
                    <h4>Customer</h4>
                    <p class="small text-muted">Order delicious meals</p>
                    <div class="card-shine"></div>
                </div>
            </div>
            <div class="col-md-3 col-sm-6 role-card-col" style="--delay: 0.2s">
                <div class="role-card" onclick="selectRole('WAITER')">
                    <div class="icon-wrapper">
                        <i class="fas fa-concierge-bell"></i>
                    </div>
                    <h4>Waiter</h4>
                    <p class="small text-muted">Manage tables & orders</p>
                    <div class="card-shine"></div>
                </div>
            </div>
            <div class="col-md-3 col-sm-6 role-card-col" style="--delay: 0.3s">
                <div class="role-card" onclick="selectRole('KITCHEN')">
                    <div class="icon-wrapper">
                        <i class="fas fa-fire"></i>
                    </div>
                    <h4>Kitchen</h4>
                    <p class="small text-muted">Track live orders</p>
                    <div class="card-shine"></div>
                </div>
            </div>
            <div class="col-md-3 col-sm-6 role-card-col" style="--delay: 0.4s">
                <div class="role-card" onclick="selectRole('ADMIN')">
                    <div class="icon-wrapper">
                        <i class="fas fa-user-shield"></i>
                    </div>
                    <h4>Admin</h4>
                    <p class="small text-muted">System management</p>
                    <div class="card-shine"></div>
                </div>
            </div>
        </div>

        <div id="loginFormContainer" class="login-box" th:classappend="${selectedRole == null} ? 'd-none' : ''">
            <button class="btn-back" onclick="goBack()">
                <i class="fas fa-arrow-left"></i>
                <span>Change Role</span>
            </button>

            <div th:if="${error}" class="alert alert-danger py-2 small mb-4 alert-animated">
                <i class="fas fa-exclamation-circle me-2"></i> 
                <span th:text="${error}"></span>
            </div>

            <h2 id="selectedRoleTitle" class="mb-4 form-title"
                th:text="${selectedRole != null} ? ${selectedRole + ' LOGIN'} : 'LOGIN'">LOGIN</h2>

            <form th:action="@{/login}" method="post">
                <input type="hidden" name="role" id="hiddenRoleInput" th:value="${selectedRole}">

                <div class="mb-3 text-start input-group-animated">
                    <label class="form-label small text-muted">
                        <i class="fas fa-user me-2"></i>Username
                    </label>
                    <input type="text" name="username" class="form-control custom-input" required
                        placeholder="Enter your username">
                    <div class="input-line"></div>
                </div>
                <div class="mb-4 text-start input-group-animated">
                    <label class="form-label small text-muted">
                        <i class="fas fa-lock me-2"></i>Password
                    </label>
                    <input type="password" name="password" class="form-control custom-input" required
                        placeholder="••••••••">
                    <div class="input-line"></div>
                </div>
                <button type="submit" class="btn btn-warning w-100 py-2 btn-submit">
                    <span>Sign In</span>
                    <i class="fas fa-arrow-right ms-2"></i>
                </button>
            </form>
        </div>
    </div>

    <script>
        function selectRole(role) {
            const roleSelection = document.getElementById('roleSelection');
            const loginForm = document.getElementById('loginFormContainer');
            
            // Add exit animation to role cards
            roleSelection.style.animation = 'fadeOutUp 0.5s ease forwards';
            
            setTimeout(() => {
                roleSelection.classList.add('d-none');
                loginForm.classList.remove('d-none');
                loginForm.style.animation = 'fadeInUp 0.6s ease forwards';
                
                document.getElementById('selectedRoleTitle').innerText = role + " LOGIN";
                document.getElementById('hiddenRoleInput').value = role;
            }, 500);
        }

        function goBack() {
            window.location.href = "/";
        }

        // Add ripple effect to role cards
        document.querySelectorAll('.role-card').forEach(card => {
            card.addEventListener('click', function(e) {
                const ripple = document.createElement('span');
                ripple.classList.add('ripple');
                this.appendChild(ripple);
                
                const rect = this.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = e.clientX - rect.left - size/2 + 'px';
                ripple.style.top = e.clientY - rect.top - size/2 + 'px';
                
                setTimeout(() => ripple.remove(), 600);
            });
        });

        // Animate elements on load
        window.addEventListener('load', () => {
            document.body.style.opacity = '1';
        });
    </script>
</body>

</html>
